services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyberscale
      POSTGRES_USER: cyberscale
      POSTGRES_PASSWORD: cyberscale_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberscale"]
      interval: 5s
      timeout: 5s
      retries: 5

  cyberscale-web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py setup_playground &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://cyberscale:cyberscale_dev@postgres:5432/cyberscale
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      MISP_URL: "https://misp"
      MISP_API_KEY: "bZQyaa5SmvzyZ7zanXrtoxg6VQNSHK6vqnh7rfaE"
      MISP_SSL_VERIFY: "false"
      MISP_B_URL: "https://misp-b"
      MISP_B_API_KEY: "changeme-run-misp-b-init"
    volumes:
      - .:/app
      - model_cache:/app/data/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  misp-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD: misp_dev
      MYSQL_ROOT_PASSWORD: misp_root_dev
    volumes:
      - misp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmisp_root_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

  misp-redis:
    image: redis:7-alpine
    command: redis-server --requirepass redispassword
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    environment:
      MYSQL_HOST: misp-db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD: misp_dev
      REDIS_HOST: misp-redis
      BASE_URL: "https://localhost"
      ADMIN_EMAIL: "admin@admin.test"
      ADMIN_PASSWORD: "admin"
      ADMIN_KEY: "cyberscale-misp-test-api-key"
      NOREDIR: "true"
    volumes:
      - ./data/misp-objects:/misp-objects:ro
      - ./scripts/misp-init.sh:/scripts/misp-init.sh:ro
    ports:
      - "8443:443"
    depends_on:
      misp-db:
        condition: service_healthy
      misp-redis:
        condition: service_healthy

  misp-b-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD: misp_b_dev
      MYSQL_ROOT_PASSWORD: misp_b_root_dev
    volumes:
      - misp_b_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmisp_b_root_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

  misp-b-redis:
    image: redis:7-alpine
    command: redis-server --requirepass redispassword
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  misp-b:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    environment:
      MYSQL_HOST: misp-b-db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD: misp_b_dev
      REDIS_HOST: misp-b-redis
      BASE_URL: "https://localhost:8444"
      ADMIN_EMAIL: "admin@admin.test"
      ADMIN_PASSWORD: "admin"
      NOREDIR: "true"
    volumes:
      - ./data/misp-objects:/misp-objects:ro
      - ./scripts/misp-b-init.sh:/scripts/misp-b-init.sh:ro
    ports:
      - "8444:443"
    depends_on:
      misp-b-db:
        condition: service_healthy
      misp-b-redis:
        condition: service_healthy

volumes:
  postgres_data:
  model_cache:
  misp_db_data:
  misp_b_db_data:
